version: "3.9"

services:
  # ── Keycloak OIDC Provider ───────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev --import-realm --hostname http://localhost:8180 --hostname-backchannel-dynamic true
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/master HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && timeout 2 cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── MCP Servers (streamable HTTP) ────────────────
  weather-server:
    build:
      context: .
      dockerfile: servers/weather/Dockerfile
    ports:
      - "9002:9002"
    env_file: .env
    environment:
      MCP_AUTH_ENABLED: ${MCP_AUTH_ENABLED:-false}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-mcp}
      OAUTH_CLIENT_ID: weather-server
      OAUTH_CLIENT_SECRET: weather-server-secret
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,urllib.error;\ntry: urllib.request.urlopen('http://localhost:9002/mcp')\nexcept urllib.error.HTTPError: pass"]
      interval: 30s
      timeout: 5s
      retries: 3

  stock-server:
    build:
      context: .
      dockerfile: servers/stock/Dockerfile
    ports:
      - "9003:9003"
    env_file: .env
    environment:
      MCP_AUTH_ENABLED: ${MCP_AUTH_ENABLED:-false}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-mcp}
      OAUTH_CLIENT_ID: stock-server
      OAUTH_CLIENT_SECRET: stock-server-secret
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,urllib.error;\ntry: urllib.request.urlopen('http://localhost:9003/mcp')\nexcept urllib.error.HTTPError: pass"]
      interval: 30s
      timeout: 5s
      retries: 3

  calculator-server:
    build:
      context: .
      dockerfile: servers/calculator/Dockerfile
    ports:
      - "9004:9004"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9004/mcp')"]
      interval: 30s
      timeout: 5s
      retries: 3

  greeting-server:
    build:
      context: .
      dockerfile: servers/greeting/Dockerfile
    ports:
      - "9005:9005"
    env_file: .env
    environment:
      MCP_AUTH_ENABLED: ${MCP_AUTH_ENABLED:-false}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-mcp}
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,urllib.error;\ntry: urllib.request.urlopen('http://localhost:9005/mcp')\nexcept urllib.error.HTTPError: pass"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── MCP Gateway (aggregating proxy) ─────────────
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      MCP_AUTH_ENABLED: ${MCP_AUTH_ENABLED:-false}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-mcp}
      GATEWAY_PORT: "8000"
      CREDENTIALS_FILE: /app/infra/credentials.yaml
    depends_on:
      - weather-server
      - stock-server
      - calculator-server
      - greeting-server

  # ── Registry ─────────────────────────────────────
  registry-backend:
    build:
      context: .
      dockerfile: registry/backend/Dockerfile
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-mcp}
      REGISTRY_OAUTH_CLIENT_ID: mcp-registry
      REGISTRY_OAUTH_CLIENT_SECRET: registry-secret
      OIDC_USERNAME: testuser
      OIDC_PASSWORD: testpass
      STATUS_CHECK_INTERVAL: "60"
    volumes:
      - registry-data:/app/data
    depends_on:
      keycloak:
        condition: service_healthy
      weather-server:
        condition: service_started
      stock-server:
        condition: service_started
      calculator-server:
        condition: service_started
      greeting-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  registry-frontend:
    build:
      context: .
      dockerfile: registry/frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - registry-backend

volumes:
  registry-data:
