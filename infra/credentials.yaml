# ─────────────────────────────────────────────────────────────
# Centralized OAuth Credentials for all MCP components
# ─────────────────────────────────────────────────────────────
# All Keycloak client IDs and secrets in one place.
# Mount or copy this file into containers that need OAuth access.
# NEVER commit real secrets — use this as a template and override
# via environment variables or a secrets manager in production.
# ─────────────────────────────────────────────────────────────

keycloak:
  url: http://localhost:8180
  # Inside Docker network use: http://keycloak:8080
  internal_url: http://keycloak:8080
  realm: mcp

# ── MCP Server credentials (confidential clients) ───────────
servers:
  weather-server:
    client_id: weather-server
    client_secret: weather-server-secret
    port: 9002

  stock-server:
    client_id: stock-server
    client_secret: stock-server-secret
    port: 9003

# ── MCP Gateway credentials (confidential — connects to servers) ─
gateway:
  client_id: mcp-gateway
  client_secret: gateway-secret
  port: 8000

# ── Client credentials (for agentic clients that call MCP servers) ─
clients:
  adk-agui:
    client_id: adk-agui-client
    client_secret: adk-agui-secret

  cli:
    client_id: cli-client
    client_secret: cli-secret

  langgraph:
    client_id: langgraph-client
    client_secret: langgraph-secret

# ── Test user (for development / password grant) ─────────────
test_user:
  username: testuser
  password: testpass
